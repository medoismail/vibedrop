app = "vibedrop-signaling"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3010"

[http_service]
  internal_port = 3010
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
